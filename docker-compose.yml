# One command to run the whole stack locally:  docker compose up --build
# Reads OPENAI_API_KEY (and friends) from your local .env automatically.

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ainews
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ainews"]
      interval: 5s
      timeout: 5s
      retries: 12

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/ainews
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OPENAI_EMBED_MODEL: ${OPENAI_EMBED_MODEL:-text-embedding-3-small}
      INGEST_SECRET: ${INGEST_SECRET:-change-me-in-production}
      ENRICH_LIMIT: ${ENRICH_LIMIT:-40}
      RUN_MIGRATIONS: "true" # migrate + seed on boot
      NODE_ENV: production
      PORT: "3000"
    ports:
      - "3000:3000"

  # Optional split-out ingestion. The app already self-schedules ingestion in
  # production (src/instrumentation.ts); only use this profile if you also set
  # INGEST_INTERVAL_MINUTES=0 on the app service. Start with:
  #   docker compose --profile worker up
  worker:
    build: .
    profiles: ["worker"]
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/ainews
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OPENAI_EMBED_MODEL: ${OPENAI_EMBED_MODEL:-text-embedding-3-small}
      INGEST_INTERVAL_MINUTES: ${INGEST_INTERVAL_MINUTES:-15}
      RUN_MIGRATIONS: "false"
      NODE_ENV: production
    command: ["npm", "run", "worker"]

volumes:
  pgdata:
